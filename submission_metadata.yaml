ai_usage_summary: |
  AI assistants were used for brainstorming, architecture discussions, debugging,
  documentation improvements, and code review. The ranking algorithm, scoring
  strategy, feature engineering, adaptive weighting, implementation, testing,
  and all final engineering decisions were completed and validated by the team.
  No candidate data or evaluation results were shared with external AI services.

methodology_summary: |
  Hybrid AI-powered candidate ranking system executed in two phases.
  Phase 1 performs trap detection to identify honeypots, keyword stuffing,
  and behavioral anomalies. Phase 2 computes a weighted hybrid score using
  MiniLM semantic similarity (40%), skill matching with synonym awareness (20%),
  career fit based on actual work experience (20%), career progression (10%),
  behavioral hiring signals (15%), and education bonus (5%). The system
  automatically extracts requirements from the Job Description, adapts scoring
  weights based on JD emphasis, generates explainable reasoning for every
  recommendation, and performs CPU-only inference using precomputed MiniLM
  embeddings without requiring internet access.

declarations:
  read_submission_spec: true
