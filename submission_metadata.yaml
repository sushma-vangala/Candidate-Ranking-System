  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 8

ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and iterative improvement.
  All engineering decisions, threshold choices, and design rationale were made by the team.
  No candidate data was fed to any external LLM.

methodology_summary: |
  Two-phase hybrid ranking system. Phase 1: rule-based trap detection (honeypots,
  keyword stuffers, behavioral ghosts). Phase 2: hybrid scoring — MiniLM embedding
  similarity (40%), skill match with synonym awareness (20%), career fit on work
  content not employer names (20%), career progression trajectory (10%),
  behavioral platform signals (15%), education bonus (5%).
  JD parsed automatically from text — no hardcoded skill lists.
  Precomputed MiniLM embeddings enable <60s ranking on CPU with no network access.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
